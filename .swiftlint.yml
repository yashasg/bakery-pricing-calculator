# ─────────────────────────────────────────────────────────────────────────────
# .swiftlint.yml — Hardened, design-system-aligned lint policy
#
# Philosophy
#   • No magic numbers — named constants or design-system tokens only.
#   • Dynamic Type first — every font size must respond to accessibility settings.
#   • Accessibility is non-negotiable — labels, traits, and hit targets enforced.
#   • Design-system compliance — colors and spacing come from the token catalogue,
#     not inline literals.
#   • Hardened but usable — correctness/accessibility violations are :error;
#     layout heuristics are :warning so clean-slate projects still compile.
#
# References
#   • Design system + spacing/color tokens → docs/DesignSystem.md
#   • Swift coding standards (§2–§3)       → docs/swift_coding_standards.md
#   • SwiftLint rule docs                  → https://realm.github.io/SwiftLint/
#
# Bootstrap note: __APP_NAME__ tokens below are replaced by bootstrap.sh when
# the template is initialized; do not substitute them manually.
# ─────────────────────────────────────────────────────────────────────────────

# ── Scope ─────────────────────────────────────────────────────────────────────

included:
  - app/__APP_NAME__
  - app/__APP_NAME__Tests
  - app/__APP_NAME__UITests

excluded:
  - prototype
  - app/.build
  - app/DerivedData
  - app/fastlane
  - Pods
  - DerivedData
  # cwd-independent globs: the `ci` lane runs swiftlint from `app/`, where the
  # path-relative excludes above do not resolve. These match build artifacts and
  # generated sources anywhere in the tree (e.g. DerivedData/DerivedSources).
  - "**/.build/**"
  - "**/DerivedData/**"
  - "**/DerivedSources/**"
  - "**/*.generated.swift"
  - "**/*Generated.swift"
  - "**/*+Generated.swift"
  - "**/GeneratedAssetSymbols.swift"

# ── Thresholds ────────────────────────────────────────────────────────────────

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

# ── Opt-in rules ──────────────────────────────────────────────────────────────

opt_in_rules:
  # Accessibility (built-in opt-in) — error; see §2.8 of coding standards
  - accessibility_label_for_image
  - accessibility_trait_for_button

  # Safety / correctness
  - force_unwrapping
  - implicitly_unwrapped_optional
  - fatal_error_message
  - no_magic_numbers
  - discouraged_optional_boolean
  - weak_delegate

  # Performance
  - empty_count
  - first_where
  - last_where
  - reduce_into
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil

  # Idiomatic Swift
  - explicit_init
  - toggle_bool
  - redundant_type_annotation
  - redundant_nil_coalescing
  - prefer_self_type_over_type_of_self
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init

  # Style
  - closure_spacing
  - unneeded_parentheses_in_closure_argument
  - sorted_imports
  - vertical_parameter_alignment_on_call
  - multiline_arguments

# ── Disabled rules ────────────────────────────────────────────────────────────

disabled_rules:
  # SwiftFormat owns trailing whitespace via `trailingSpace` rule (--trimwhitespace always).
  - trailing_whitespace
  # SwiftFormat owns trailing comma policy (--commas always). SwiftLint's built-in
  # trailing_comma rule defaults to "no trailing commas" which conflicts. One tool
  # owns it: SwiftFormat. This is a formatting concern, not a semantic one.
  - trailing_comma

# ── Rule configuration ────────────────────────────────────────────────────────

no_magic_numbers:
  severity: warning
  # XCTestCase subclasses are automatically exempt (standard test-value pattern).
  test_parent_classes:
    - XCTestCase
    - QuickSpec
  # Allowed: zero/identity/boolean sentinels + Apple's canonical Dynamic Type
  # reference point sizes (always paired with relativeTo: in Font.custom calls).
  allowed_numbers:
    - 0
    - 1
    - -1
    - 2
    - 3
    - 4
    - 100
    # Apple Dynamic Type reference sizes (iOS text-style scale)
    - 11
    - 12
    - 13
    - 15
    - 16
    - 17
    - 20
    - 22
    - 28
    - 34

force_unwrapping:
  severity: error

# IUO is standard for XCTestCase setUp/tearDown outlets; warn rather than error
# so test scaffolding (e.g. `var app: XCUIApplication!`) is flagged but not
# blocking. Add `// swiftlint:disable:next implicitly_unwrapped_optional` with
# an explanatory comment where the pattern is intentional.
implicitly_unwrapped_optional:
  severity: warning
  mode: all_except_iboutlets

accessibility_label_for_image:
  severity: error

accessibility_trait_for_button:
  severity: error

fatal_error_message:
  severity: error

empty_count:
  severity: warning

first_where:
  severity: warning

multiline_arguments:
  severity: warning
  only_enforce_after_first_closure_on_first_line: true

vertical_parameter_alignment_on_call:
  severity: warning

# Allow underscores so template tokens like __APP_NAME__App are not flagged as
# type-name violations before bootstrap.sh replaces them with the real name.
type_name:
  allowed_symbols: ["_"]

# ── Custom rules: HIG + design-system enforcement ─────────────────────────────
# Each rule maps to an explicit HIG section or a design-system decision.
# Severity guide: typography/color correctness → error; layout heuristics → warning.

custom_rules:

  # ── Typography ──────────────────────────────────────────────────────────────
  no_hardcoded_font_size:
    name: "No Hardcoded Font Size"
    regex: '\.font\(\.system\(size:\s*[0-9]|Font\.system\(size:\s*[0-9]'
    match_kinds:
      - identifier
      - keyword
    message: >
      Use Dynamic Type semantic text styles (.body, .headline, .title, etc.) or
      @ScaledMetric so the font responds to the user's accessibility text-size
      setting. Hardcoded sizes freeze at the declared point value regardless of
      system settings. See docs/DesignSystem.md §Typography / HIG §Typography.
    severity: error

  no_uppercased_text:
    name: "No .uppercased() on Text"
    regex: '\.uppercased\(\)'
    match_kinds:
      - identifier
    message: >
      Use .textCase(.uppercase) instead of .uppercased(). VoiceOver reads
      .uppercased() output as separate letters (acronym), breaking the
      screen-reader experience. See docs/swift_coding_standards.md §3.2
      / HIG §Accessibility.
    severity: error

  # ── Color ───────────────────────────────────────────────────────────────────
  color_literal_rgb:
    name: "No Inline RGB Color"
    regex: 'Color\(red:\s*[0-9]|Color\(red:\s*\.'
    match_kinds:
      - identifier
    message: >
      Define colors as Asset Catalog color pairs (dark + light variants) or use
      semantic system colors (e.g. .primary, .secondary). Hardcoded RGB values
      do not adapt to dark mode. See docs/DesignSystem.md §Color / HIG §Color.
    severity: error

  # ── Layout / spacing ────────────────────────────────────────────────────────
  no_fixed_frame_dimension:
    name: "Avoid Fixed Frame Dimensions"
    regex: '\.frame\((width|height):\s*[1-9][0-9]'
    match_kinds:
      - identifier
      - keyword
    message: >
      Prefer flexible or relative layout (.frame(maxWidth: .infinity),
      .layoutPriority, GeometryReader) over fixed numeric .frame(width:) or
      .frame(height:). If fixed sizing is genuinely required, add an inline
      comment referencing the design justification. See docs/DesignSystem.md
      §Spacing / HIG §Layout.
    severity: warning

  no_raw_padding_number:
    name: "No Raw Padding Number"
    regex: '\.padding\(\s*[1-9][0-9]*\b|\.padding\(\.[a-zA-Z]+,\s*[1-9][0-9]*\b'
    # No match_kinds: SwiftLint's SourceKit tokeniser does not reliably classify
    # .padding(...) argument-expression positions as identifier/keyword in all
    # chaining contexts, causing match_kinds to over-filter and silently suppress
    # the rule. Omitting it (consistent with no_raw_spacing_literal) is correct.
    message: >
      Use spacing constants from the design system (e.g. Spacing.inner,
      Spacing.margin, Spacing.section) instead of raw numeric literals in
      .padding(). Raw numbers produce inconsistent spacing and cannot be updated
      globally. See docs/DesignSystem.md §Spacing.
    severity: error

  missing_min_touch_target:
    name: "Potential Sub-44pt Touch Target"
    regex: '\.padding\(\.vertical,\s*[0-9]\b|\.padding\(\.vertical,\s*1[0-1]\b'
    match_kinds:
      - identifier
      - keyword
    message: >
      Vertical padding values below ~12 pt may produce a total touch target
      shorter than the HIG-required 44 pt minimum. Use Spacing constants and
      verify the combined height of the control. See docs/swift_coding_standards.md
      §3.2 / HIG §Buttons.
    severity: warning

  # ── Guardrails (shift runtime checks to static) ───────────────────────────────
  # These four close project guardrails statically so they no longer depend on a
  # runtime test or a code-review catch. match_kinds excludes comments/strings, so
  # the many "// never URLSession / UUID()" header notes do NOT trip them.

  no_network_apis:
    name: "No Network APIs"
    regex: '\b(URLSession|URLRequest|URLSessionConfiguration|URLSessionDataTask)\b'
    match_kinds:
      - identifier
      - typeidentifier
    message: >
      Networking is banned (no-network guardrail). URLSession/URLRequest and any
      third-party analytics SDK are prohibited; MetricKit is the only permitted
      telemetry. A network requirement needs a written decision in
      .squad/decisions.md first. See docs/swift_coding_standards.md §No Network.
    severity: error

  no_system_font_style:
    name: "No System Font Style"
    regex: '\.font\(\s*\.(largeTitle|title3|title2|title|headline|subheadline|callout|caption2|caption|footnote|body)\b'
    match_kinds:
      - identifier
    message: >
      The typeface is Satoshi — never substitute SF Pro. Use the Font+Satoshi
      helpers (.appBody, .appTitle2, .appHeadline, …) instead of .font(.body) /
      .font(.title). See docs/DesignSystem.md §Typeface.
    severity: error

  no_dispatch_main_async:
    name: "No DispatchQueue.main.async in Views"
    regex: 'DispatchQueue\.main\.async'
    match_kinds:
      - identifier
    message: >
      Do not hop threads with DispatchQueue.main.async in SwiftUI. Use .task { },
      @MainActor, or async/await. See docs/swift_coding_standards.md §Concurrency.
    severity: error

  deterministic_domain_layer:
    name: "Non-deterministic API in Domain layer"
    included: ".*/Domain/.*"
    regex: '\b(UUID|Date)\s*\(\s*\)|\.random\b|\barc4random\b'
    match_kinds:
      - identifier
      - typeidentifier
    message: >
      The Domain/ layer must be deterministic — no UUID(), Date(), .random, or
      arc4random in compute/domain paths. Inject clocks/IDs from the persistence
      boundary instead. See docs/swift_coding_standards.md §Determinism.
    severity: error

  # ── Spacing design-system invariant ──────────────────────────────────────────
  # Principle: every spacing value on every screen must come from the shared
  # Spacing.* token scale. No raw numeric literal is permitted in any
  # spacing-bearing SwiftUI modifier or initialiser, regardless of screen or
  # container. This makes the enforcement AGNOSTIC — it is not scoped to lists,
  # EdgeInsets, or any single pattern. The invariant: spacing literals are banned;
  # Spacing.* tokens are mandatory.
  #
  # Allow-list rationale (do NOT flag these):
  #   • 0 / .zero — idiomatic SwiftUI sentinel (no-gap / flush); always safe.
  #   • Spacing.* — the correct tokens (won't match [1-9]).
  #   • Radius.* / Sizing.* — corner radii and fixed control sizes; not inter-element spacing.
  #   • @ScaledMetric vars — Dynamic Type scaling handled at declaration.
  #   • .frame(width:height:) for glyph/badge sizing — intrinsic sizing, not layout spacing.
  #     This remains covered by the separate `no_fixed_frame_dimension` warning.
  #   • Variable names in spacing: positions (e.g. VStack(spacing: spacing)) — don't match [1-9].
  #
  # ADRs: ichigo-design-system-margin-enforcement (2026-05-XX),
  #        ichigo-agnostic-spacing-enforcement (2026-06-02 — supersedes/refines the prior ADR).

  no_bare_inset_grouped_list:
    name: "No Bare insetGrouped/grouped List Style"
    regex: '\.listStyle\(\.(insetGrouped|grouped)\)'
    match_kinds:
      - identifier
    message: >
      Use fabricListStyle() (Components/FabricList.swift) instead of
      .listStyle(.insetGrouped) or .listStyle(.grouped) directly. The wrapper
      centralises the standard inset-grouped treatment (style +
      scrollContentBackground) so the correct style is never partially applied.
      For custom-background rows also add .listRowInsets(EdgeInsets(top: 0,
      leading: Spacing.margin, bottom: 0, trailing: Spacing.margin)) per row.
      See docs/DesignSystem.md §Spacing and ADR ichigo-design-system-margin-enforcement.
    severity: error

  no_raw_spacing_literal:
    name: "No Raw Spacing Literal (Design System)"
    # Catches raw non-zero numeric literals in the spacing-bearing positions of:
    #   • EdgeInsets(top:|bottom:|leading:|trailing:)  — all four axes
    #   • VStack/HStack/LazyVStack/LazyHStack/FabricStack(spacing:)
    #   • Spacer(minLength:)
    #
    # 0 is intentionally excluded ([1-9] start) — it is idiomatic SwiftUI for
    # "no gap / flush". Spacing tokens (Spacing.*), variable names, and other
    # non-literal expressions all start with a letter and never match [1-9].
    #
    # No match_kinds: SourceKit does not reliably tokenise these argument-
    # expression positions (confirmed with SwiftLint 0.50+), so the filter is
    # omitted — consistent with the prior no_raw_edge_insets_spacing rule.
    #
    # Regex limitation: single-line only (SwiftLint custom rules). Multi-line
    # initialisers that split arguments across lines are not caught; snapshot /
    # geometry tests remain the backstop for those cases.
    regex: '(?:VStack|HStack|LazyVStack|LazyHStack|FabricStack)\([^)]*spacing:\s*[1-9][0-9]*|EdgeInsets\([^)]*(?:top|bottom|leading|trailing):\s*[1-9][0-9]*|Spacer\(minLength:\s*[1-9][0-9]*'
    message: >
      Use Spacing.* constants (e.g. Spacing.inner, Spacing.margin, Spacing.tight)
      instead of raw numeric literals in spacing-bearing modifiers/initialisers.
      This rule is screen- and container-agnostic: the invariant is that ALL
      spacing values across ALL screens must come from the shared token scale so
      the app feels intentional and cohesive. Raw literals cannot be audited or
      updated globally and are the root cause of cross-screen drift.
      Covers: EdgeInsets (all axes), VStack/HStack/LazyVStack/LazyHStack/FabricStack spacing:,
      Spacer(minLength:). See docs/DesignSystem.md §Spacing and
      ADR ichigo-agnostic-spacing-enforcement.
    severity: error

  # ── Radius design-system invariant ──────────────────────────────────────────
  no_raw_corner_radius:
    name: "No Raw Corner Radius"
    regex: '\.cornerRadius\(\s*[1-9][0-9]*\b|RoundedRectangle\(cornerRadius:\s*[1-9][0-9]*\b|\.clipShape\(\s*RoundedRectangle\(cornerRadius:\s*[1-9][0-9]*\b|UnevenRoundedRectangle\([^)]*cornerRadii:[^)]*[1-9][0-9]*'
    message: >
      Use Radius.* constants (Radius.sm, .md, .lg, .xl) instead of raw numeric
      literals for corner radii. The design system defines a fixed scale so radii
      stay cohesive across all surfaces. See docs/DesignSystem.md §Corner Radii.
    severity: error


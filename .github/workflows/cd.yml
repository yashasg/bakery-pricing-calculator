# CD workflow (thin dispatcher).
# Each job is a reusable workflow: testflight.yml (beta/release) and screenshots.yml.
# Deploy all three files together to the mirror; local `uses: ./...` resolves them
# from the same ref as this caller.
# Required GitHub secrets: GITLAB_PAT, ASC_API_KEY_JSON (release + screenshots_and_metadata), MATCH_PASSWORD (release).

name: CD

on:
  workflow_dispatch:
    inputs:
      lane:
        description: Fastlane lane (beta = TestFlight, release = App Store, screenshots = capture only, screenshots_and_metadata = capture + upload)
        required: true
        default: beta
        type: choice
        options:
          - beta
          - release
          - screenshots
          - screenshots_and_metadata
      ref_type:
        description: Build from a branch or a tag?
        required: true
        default: branch
        type: choice
        options:
          - branch
          - tag
      ref:
        description: Branch name or tag name to build (e.g. main, v1.2.3, feat/foo)
        required: true
        default: main
        type: string
      notes:
        description: Optional release notes passed to the selected Fastlane lane
        required: false
        default: ""
        type: string
      skip_tests:
        description: Skip the Release CI gate before uploading (beta/release only)
        required: false
        default: false
        type: boolean
      version_bump:
        description: Semantic version bump (beta/release only; choose none for tag dispatches)
        required: false
        default: patch
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: read
  actions: read

# Job-level `concurrency` is not allowed on jobs that call a reusable workflow,
# so it lives at the workflow level. Each dispatch runs exactly one job
# (testflight or screenshots, by lane), so a lane+ref group is equivalent.
concurrency:
  group: cd-${{ github.event.inputs.lane }}-${{ github.event.inputs.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    name: ${{ inputs.lane == 'release' && 'App Store Release' || 'TestFlight' }}
    if: ${{ inputs.lane == 'beta' || inputs.lane == 'release' }}
    uses: ./.github/workflows/testflight.yml
    with:
      lane: ${{ inputs.lane }}
      ref: ${{ inputs.ref }}
      ref_type: ${{ inputs.ref_type }}
      notes: ${{ inputs.notes }}
      skip_tests: ${{ inputs.skip_tests }}
      version_bump: ${{ inputs.version_bump }}
    secrets: inherit

  screenshots:
    name: ${{ inputs.lane == 'screenshots_and_metadata' && 'Screenshots + Metadata' || 'Capture Screenshots' }}
    if: ${{ inputs.lane == 'screenshots' || inputs.lane == 'screenshots_and_metadata' }}
    uses: ./.github/workflows/screenshots.yml
    with:
      lane: ${{ inputs.lane }}
      ref: ${{ inputs.ref }}
    secrets: inherit

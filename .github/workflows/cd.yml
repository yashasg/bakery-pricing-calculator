# CD workflow (thin dispatcher).
# Each job is a reusable workflow: testflight.yml (beta/release) and screenshots.yml.
# Deploy all three files together to the mirror; local `uses: ./...` resolves them
# from the same ref as this caller.
# Required GitHub secrets: GITLAB_PAT, ASC_API_KEY_JSON (release + screenshots_and_metadata), MATCH_PASSWORD (release).
# Hourly (:53, off the :00 congestion spike): beta from main, skipped when main had no new commits since the last run.

name: CD

on:
  schedule:
    - cron: "53 * * * *"
  workflow_dispatch:
    inputs:
      lane:
        description: Fastlane lane (beta = TestFlight, release = App Store, screenshots = capture only, screenshots_and_metadata = capture + upload, metadata = text metadata only, no capture; screenshots managed manually in ASC per fastlane#30094)
        required: true
        default: beta
        type: choice
        options:
          - beta
          - release
          - screenshots
          - screenshots_and_metadata
          - metadata
      ref_type:
        description: Build from a branch or a tag?
        required: true
        default: branch
        type: choice
        options:
          - branch
          - tag
      ref:
        description: Branch name or tag name to build (e.g. main, v1.2.3, feat/foo)
        required: true
        default: main
        type: string
      notes:
        description: Optional release notes passed to the selected Fastlane lane
        required: false
        default: ""
        type: string
      skip_tests:
        description: Skip the Release CI gate before uploading (beta/release only)
        required: false
        default: false
        type: boolean
      version_bump:
        description: Semantic version bump (beta/release only; choose none for tag dispatches)
        required: false
        default: patch
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: read
  actions: read

concurrency:
  group: cd-${{ github.event.inputs.lane || 'beta' }}-${{ github.event.inputs.ref || 'main' }}
  cancel-in-progress: false

jobs:
  # Skips when main had no commits since the last hourly run; manual dispatch always proceeds.
  guard:
    name: Change-since-last-run check
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git clone --depth=50 --branch main \
            "https://oauth2:${{ secrets.GITLAB_PAT }}@gitlab.com/yashasg/bakery-pricing-calculator.git" repo
          if [ -n "$(cd repo && git log --since='1 hour ago' --oneline)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  testflight:
    name: ${{ inputs.lane == 'release' && 'App Store Release' || 'TestFlight' }}
    needs: guard
    if: ${{ needs.guard.outputs.changed == 'true' && (inputs.lane == null || inputs.lane == 'beta' || inputs.lane == 'release') }}
    uses: ./.github/workflows/testflight.yml
    with:
      lane: ${{ inputs.lane || 'beta' }}
      ref: ${{ inputs.ref || 'main' }}
      ref_type: ${{ inputs.ref_type || 'branch' }}
      notes: ${{ inputs.notes || '' }}
      skip_tests: ${{ inputs.skip_tests || false }}
      version_bump: ${{ inputs.version_bump || 'patch' }}
    secrets: inherit

  screenshots:
    name: ${{ inputs.lane == 'metadata' && 'Upload Metadata + Screenshots' || (inputs.lane == 'screenshots_and_metadata' && 'Screenshots + Metadata' || 'Capture Screenshots') }}
    if: ${{ inputs.lane == 'screenshots' || inputs.lane == 'screenshots_and_metadata' || inputs.lane == 'metadata' }}
    uses: ./.github/workflows/screenshots.yml
    with:
      lane: ${{ inputs.lane }}
      ref: ${{ inputs.ref }}
    secrets: inherit

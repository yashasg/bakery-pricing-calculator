name: CI

on:
  repository_dispatch:
    types: [gitlab_push, gitlab_mr]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.event.client_payload.branch }}
  cancel-in-progress: ${{ github.event.client_payload.event == 'push' && github.event.client_payload.branch != 'main' }}

env:
  XCODE_VERSION: "26"
  DERIVED_DATA_PATH: ${{ github.workspace }}/build/app/xcode-derived-data
  MODULE_CACHE: ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
  BRANCH: ${{ github.event.client_payload.branch }}
  CACHE_BASE: derived-data-${{ runner.os }}-xcode26-
  GITLAB_REPO_URL: https://gitlab-token:${{ secrets.GITLAB_PAT }}@gitlab.com/${{ github.event.client_payload.project_name }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 30
    if: |
      github.event.client_payload.event == 'merge_request' ||
      github.event.client_payload.event == 'push'

    steps:
      - name: Checkout from GitLab
        run: git clone --depth 1 --branch "${{ env.BRANCH }}" "${{ env.GITLAB_REPO_URL }}" .

      - name: Restore DerivedData cache
        id: cache-derived-data
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ${{ env.DERIVED_DATA_PATH }}
            ${{ env.MODULE_CACHE }}
          key: ${{ env.CACHE_BASE }}${{ env.BRANCH }}-${{ hashFiles('app/app.xcodeproj/**/*.pbxproj', 'app/app.xcodeproj/xcshareddata/xcschemes/*.xcscheme') }}
          restore-keys: |
            ${{ env.CACHE_BASE }}${{ env.BRANCH }}-
            ${{ env.CACHE_BASE }}main-

      - name: Set up Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: app

      - name: Build & Test
        working-directory: app
        run: bundle exec fastlane ci
        env:
          CI_BRANCH: ${{ github.event.client_payload.branch }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_HOST: ${{ vars.GITLAB_HOST }}
          DERIVED_DATA_PATH: ${{ env.DERIVED_DATA_PATH }}
          MATCH_ORG: ${{ vars.MATCH_ORG }}
          MATCH_REPO: ${{ vars.MATCH_REPO }}
          GITLAB_PROJECT_ID: ${{ github.event.client_payload.project_id }}
          GITLAB_SHA: ${{ github.event.client_payload.sha }}
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          DANGER_GITLAB_API_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          CI_MERGE_REQUEST_IID: ${{ github.event.client_payload.mr_iid }}
          CI_PROJECT_ID: ${{ github.event.client_payload.project_id }}
          CI_SERVER_URL: ${{ vars.GITLAB_HOST }}

      - name: Save DerivedData cache
        if: always() && steps.cache-derived-data.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ${{ env.DERIVED_DATA_PATH }}
            ${{ env.MODULE_CACHE }}
          key: ${{ steps.cache-derived-data.outputs.cache-primary-key }}

name: CI

# Triggered by the GitLab → GitHub webhook (repository_dispatch). GitLab pushes a
# `gitlab_push` or `gitlab_mr` event via the GitHub API carrying the GitLab-side
# context (project_id, project_name, sha, branch, mr_iid) needed to check out the
# exact commit and post commit status back to the MR.
#
# This file is the single canonical CI definition. The copy committed in the repo
# is kept byte-identical to the deployed GitHub mirror default-branch workflow so
# CIWorkflowEnvContractTests guard the file that actually runs (#701).
#
# Required GitHub repository secret:
#   GITLAB_PAT   GitLab Personal Access Token (api scope): clones the repo + posts status
#
# The dispatch client_payload MUST include:
#   project_id     GitLab project numeric ID
#   project_name   GitLab namespace/name used to build the clone URL
#   sha            Full 40-char commit SHA to check out and report status for
#   branch         Branch name (cache key + concurrency group)
#   mr_iid         MR IID (absent / empty for branch-push events outside an MR)
#   event          'merge_request' or 'push'

on:
  repository_dispatch:
    types: [gitlab_push, gitlab_mr]
  # Manual trigger for bridge debugging. With no client_payload the build job's
  # guard below evaluates false, so a bare manual run is a safe no-op smoke test
  # that only confirms the workflow parses and is registered.
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.event.client_payload.branch }}
  cancel-in-progress: ${{ github.event.client_payload.event == 'push' && github.event.client_payload.branch != 'main' }}

env:
  XCODE_VERSION: "26"
  DERIVED_DATA_PATH: ${{ github.workspace }}/build/app/xcode-derived-data
  BRANCH: ${{ github.event.client_payload.branch }}
  CACHE_BASE: derived-data-macOS-xcode26-
  GITLAB_REPO_URL: https://gitlab-token:${{ secrets.GITLAB_PAT }}@gitlab.com/${{ github.event.client_payload.project_name }}
  # #368: CI_SERVER_URL must be an explicit literal HTTP URI at env level so
  # post_gitlab_status never fails with "not an HTTP URI" when the GITLAB_HOST repo
  # var is blank. GitHub Actions does not set CI_SERVER_URL automatically.
  CI_SERVER_URL: https://gitlab.com
  # #369: enforce a single named simulator for every build/test run on the runner.
  # build.sh -> resolve_simulator_context() and the Fastfile -> lane_test_options()
  # read SIMULATOR_NAME; a fixed name plus -parallel-testing-enabled NO keeps
  # xcodebuild from provisioning Clone 1 / Clone 2 destinations.
  SIMULATOR_NAME: iPhone 17 Pro

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 30
    # Only build real push / MR events that carry a concrete commit SHA. A
    # branch-deletion push (the post-merge cleanup the self-pull daemon performs)
    # arrives with an empty or all-zero SHA; skipping it here prevents the
    # spurious red "main CI" run that the by-branch checkout used to produce (#691).
    if: >-
      (github.event.client_payload.event == 'merge_request' ||
      github.event.client_payload.event == 'push') &&
      github.event.client_payload.sha &&
      github.event.client_payload.sha != '0000000000000000000000000000000000000000'

    steps:
      - name: Checkout from GitLab (immutable SHA)
        env:
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          set -euo pipefail
          # Fetch the exact dispatched commit SHA rather than the branch tip so the
          # checkout is immutable: it survives the source branch being deleted right
          # after an MR merge, and it guarantees the build + posted GitLab status
          # both reference the same commit (no stale-tip mismatch). Fall back to the
          # branch ref only if the host refuses an explicit by-SHA fetch (#691).
          git init -q .
          git remote add origin "${GITLAB_REPO_URL}"
          if [ -n "${SHA}" ] && git fetch --depth 1 origin "${SHA}"; then
            git checkout -q --detach "${SHA}"
          elif [ -n "${BRANCH}" ]; then
            echo "::warning::by-SHA fetch unavailable; falling back to branch ${BRANCH}"
            git fetch --depth 1 origin "${BRANCH}"
            git checkout -q --detach FETCH_HEAD
          else
            echo "::error::dispatch payload carried no usable gitlab_sha or branch"
            exit 1
          fi

      - name: Restore DerivedData cache
        id: cache
        uses: yashasg/bakery-pricing-calculator/.github/actions/restore-cache@main
        with:
          key: ${{ env.CACHE_BASE }}${{ env.BRANCH }}-${{ hashFiles('app/app.xcodeproj/**/*.pbxproj', 'app/app.xcodeproj/xcshareddata/xcschemes/*.xcscheme') }}
          restore-keys: |
            ${{ env.CACHE_BASE }}${{ env.BRANCH }}-
            ${{ env.CACHE_BASE }}main-

      - name: Set up Ruby and install gems
        uses: yashasg/bakery-pricing-calculator/.github/actions/setup-fastlane@main
        with:
          ruby-version: .ruby-version

      - name: Build & Test
        working-directory: app
        run: bundle exec fastlane ci
        env:
          CI_BRANCH: ${{ github.event.client_payload.branch }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_PAT }}
          GITLAB_HOST: ${{ vars.GITLAB_HOST }}
          DERIVED_DATA_PATH: ${{ env.DERIVED_DATA_PATH }}
          MATCH_ORG: ${{ vars.MATCH_ORG }}
          MATCH_REPO: ${{ vars.MATCH_REPO }}
          GITLAB_PROJECT_ID: ${{ github.event.client_payload.project_id }}
          GITLAB_SHA: ${{ github.event.client_payload.sha }}
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # #506: make bridge status failures loud. Require a successful status post
          # whenever the dispatch carried real GitLab metadata (project_id + sha);
          # bare workflow_dispatch smoke runs (no payload) skip the job entirely.
          GITLAB_STATUS_REQUIRED: ${{ github.event.client_payload.project_id != '' && github.event.client_payload.sha != '' && 'true' || 'false' }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          DANGER_GITLAB_API_TOKEN: ${{ secrets.GITLAB_PAT }}
          CI_MERGE_REQUEST_IID: ${{ github.event.client_payload.mr_iid }}
          CI_PROJECT_ID: ${{ github.event.client_payload.project_id }}

      - name: Save DerivedData cache
        if: always()
        uses: yashasg/bakery-pricing-calculator/.github/actions/save-cache@main
        with:
          key: ${{ steps.cache.outputs.cache-primary-key }}
          cache-hit: ${{ steps.cache.outputs.cache-hit }}
